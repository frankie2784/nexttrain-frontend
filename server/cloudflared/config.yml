# Cloudflare Tunnel config for NextTrain
#
# Setup (one-time, on the RPi host):
#   1. Install cloudflared:
#        curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64.deb
#        sudo dpkg -i cloudflared.deb
#
#   2. Authenticate (opens browser):
#        cloudflared tunnel login
#
#   3. Create the tunnel:
#        cloudflared tunnel create nexttrain
#      — note the tunnel ID printed (a UUID like abc123...)
#
#   4. Create a DNS record pointing to the tunnel:
#        cloudflared tunnel route dns nexttrain api.yourdomain.com
#
#   5. Fill in the two placeholders below, then start with:
#        docker compose --profile tunnel up -d

tunnel: <tunnel-id>                         # UUID from step 3
credentials-file: /root/.cloudflared/<tunnel-id>.json  # written by step 3

ingress:
  - hostname: api.yourdomain.com            # DNS record from step 4
    service: http://next-train-server:5050  # Docker service name on internal network
  - service: http_status:404               # required catch-all
